name: Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  # test:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: '20'
  #     - run: npm ci
  #     - run: npm run lint
  #     - run: npm run test
  # TODO: Re-enable tests once test suite is implemented

  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Apply Supabase migrations to staging
        run: |
          npx supabase@latest link --project-ref ${{ secrets.SUPABASE_PROJECT_ID_STAGING }} --yes
          npx supabase@latest db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Deploy to Railway Staging
        run: |
          npm install -g @railway/cli
          railway up --detach --service ${{ secrets.RAILWAY_SERVICE_STAGING }} --environment staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Apply Supabase migrations to production
        run: |
          npx supabase@latest link --project-ref ${{ secrets.SUPABASE_PROJECT_ID_PRODUCTION }} --yes
          npx supabase@latest db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Deploy to Railway Production
        run: |
          npm install -g @railway/cli
          railway up --detach --service ${{ secrets.RAILWAY_SERVICE_PRODUCTION }} --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
