---
name: Intent Validation

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, opened, reopened]
    branches:
      - main
      - staging
    paths-ignore:
      - 'docs/**'

concurrency:
  group: intent-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'ready-for-CI')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch base branch tip for diff
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Get changed files
        run: |
          CHANGED=$(git diff FETCH_HEAD..HEAD --name-only)
          echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
          echo "$CHANGED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml
          npm install -g @anthropic-ai/claude-code

      - name: Match features to changed files
        id: match
        run: |
          python tests/scripts/match_features.py \
            --test-map .github/workflows/test-map.yml
        env:
          CHANGED_FILES: ${{ env.CHANGED_FILES }}

      - name: Skip if no feature matches
        if: steps.match.outputs.has_matches != 'true'
        run: echo "No feature domains affected by this PR — skipping IDD validation."

      - name: Validate intents with Claude
        if: steps.match.outputs.has_matches == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          python tests/scripts/validate_intent.py \
            --features "${{ steps.match.outputs.matched_features }}" \
            --test-map .github/workflows/test-map.yml \
            --output-file /tmp/validation_report.md \
            --pr-number "${{ github.event.pull_request.number }}" \
            --pr-title "${{ github.event.pull_request.title }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Verify report exists
        if: steps.match.outputs.has_matches == 'true'
        run: |
          if [ ! -f /tmp/validation_report.md ]; then
            echo "Validation report not found"
            exit 1
          fi

      - name: Post validation report as PR comment
        if: steps.match.outputs.has_matches == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/validation_report.md', 'utf8');
            const marker = '<!-- github-actions-intent-validation-report -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: report,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report,
              });
            }
